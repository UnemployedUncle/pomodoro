            "surface-container-high": "#1f2020",
            "on-primary-container": "#d0d0d0",
            "tertiary-fixed": "#f5ce53",
            "surface-tint": "#c6c6c7",
            "inverse-primary": "#5e5f5f",

          },
          fontFamily: {
            "headline": ["Noto Serif"],

            "label": ["Manrope"],
            "sans": ["Inter", "Helvetica Neue", "Helvetica", "Arial", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }

<style>body {
    font-family: "Manrope", sans-serif
    }
.font-serif {
    font-family: "Noto Serif", serif
    }
.glass-panel {
    background: rgba(14, 14, 14, 0.4);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(72, 72, 72, 0.15)
    }
.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 200, "GRAD" 0, "opsz" 24
    }
.bg-focus-hero {
    background-image: linear-gradient(to bottom, rgba(14, 14, 14, 0.6), rgba(14, 14, 14, 0.9)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuAkB4chS9J4uJUyfhGaoQ5jAeOAfemWBh0kUZEAOmCOkZrQGv_eKngUoSwblzJ5CdPNM2g_r2MvgQCY4HN1YtTeHTwtKxu_8Xql_sUamNRauAkGLfy5oeBQKNYboa_LtOJ8sMIs9eTFdSit_djUkag6aNlfe0NY-VWZpwCdPvhLsdfOFRHMBEeAPp0M1rEnMBKVs4F17qN62Qy74Q34PrwTzFzpsXHSadRrFO4HVQdFgHsEm4jknf-Qle--gMXdaZrUh5vxSPazckU);
    background-size: cover;
    background-position: center
    }</style>
<style>
    body {
      min-height: 100dvh;
    }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen overflow-x-hidden selection:bg-tertiary/30">
<!-- Background Environment -->
<div class="fixed inset-0 z-0">
<img alt="Forest House Architecture" class="w-full h-full object-cover opacity-30 brightness-50 scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBjuPfD2M3NK6fmaftkZCLXDPv-q_bIybwrTqYhLcY3LPu7OLoMjZhzPsQhadWtiN3I2KvPfyMw1U8JmeEPsYBf5hdbaHQXPNtiWLLoxgLkVyVMN4oS25Og1WFWD71cge8WOgnb-k1aI7l7egItDHMy9wDeYpfyFbr0-nSoHiyaZOvv7qUlV99189oL3uXzn2FdCAbzzYTxdSakX6vaINd_tBYfFnxOfxpoEGEG9_tNK11ZhwAXtp-8xKRHjo-dMJ2wD2IjUKKRLMo"/>
<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/20 to-black/80"></div>
</div>
<!-- Top Navigation Shell -->
<nav class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-8 py-6 w-full bg-transparent">
<div class="text-xl font-sans font-light tracking-widest text-neutral-100 uppercase">Pure Focus</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-neutral-100 cursor-pointer hover:opacity-70 transition-opacity">notifications</span>
</div>
</nav>
<!-- Main Canvas -->
<main class="relative z-10 flex flex-col items-center min-h-screen pt-24 pb-32 px-6 max-w-2xl mx-auto space-y-16 backdrop-blur-[2px]">
<!-- 1. Motivational Quote (Typography) -->
<div class="w-full text-center space-y-4">
<p class="font-serif italic text-3xl md:text-4xl leading-tight text-primary-fixed-dim">
      “Simplicity is the ultimate sophistication”
    </p>
<p class="text-on-surface-variant font-body tracking-[0.2em] uppercase text-[10px]">
      — Leonardo da Vinci
    </p>
</div>
<!-- 2. The Timer (Radial Ring with countdown) -->
<div class="flex flex-col items-center">
<div class="relative flex items-center justify-center">
<!-- Progress SVG -->
<svg class="w-64 h-64 md:w-80 md:h-80 -rotate-90" viewbox="0 0 100 100">
<!-- Track -->
<circle class="text-surface-container-highest/20" cx="50" cy="50" fill="transparent" r="48" stroke="currentColor" stroke-width="1"></circle>
<!-- Progress - ~65% remaining (16:24 / 25:00) -->
<!-- Circumference for r=48 is 2 * PI * 48 = 301.59 -->
<!-- 65% of 301.59 is ~196. Dashoffset = 301.59 - 196 = 105.59 -->
<circle class="text-primary-dim transition-all duration-1000 ease-linear" cx="50" cy="50" fill="transparent" r="48" stroke="currentColor" stroke-dasharray="301.59" stroke-dashoffset="105.59" stroke-linecap="round" stroke-width="1.5" style="filter: drop-shadow(0 0 4px rgba(198, 198, 199, 0.4));"></circle>
</svg>
<!-- Time Display -->
<div class="absolute inset-0 flex flex-col items-center justify-center text-center">
<span class="font-serif text-6xl md:text-7xl font-light tracking-tighter text-on-surface select-none">16:24</span>
<span class="text-[8px] uppercase tracking-[0.4em] text-on-surface-variant mt-2">Deep Work Session</span>
</div>
</div>
<!-- Control Buttons -->
<div class="flex gap-10 mt-10">
<button class="group flex flex-col items-center gap-2">
<div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center group-hover:scale-105 group-active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface transition-colors" data-icon="pause">pause</span>
</div>
<span class="text-[9px] uppercase tracking-widest text-on-surface-variant group-hover:text-on-surface">Pause</span>
</button>
<button class="group flex flex-col items-center gap-2">
<div class="w-12 h-12 rounded-full glass-panel flex items-center justify-center group-hover:scale-105 group-active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-on-surface transition-colors" data-icon="restart_alt">restart_alt</span>
</div>
<span class="text-[9px] uppercase tracking-widest text-on-surface-variant group-hover:text-on-surface">Reset</span>
</button>
</div>
</div>
<!-- Tasks Group -->
<div class="w-full space-y-12 max-w-xs">
<!-- 3. The To-do list (Priority Focus) -->
<section class="space-y-4">
<h3 class="text-[10px] uppercase tracking-[0.3em] text-tertiary/60 font-medium text-center">Core Focus</h3>
<div class="space-y-3">
<div class="flex items-center gap-4 group cursor-pointer">
<div class="w-5 h-5 rounded-full border border-tertiary flex items-center justify-center bg-tertiary/10">
<span class="material-symbols-outlined text-[14px] text-tertiary" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-sm font-body text-on-surface/50 line-through decoration-on-surface-variant/40">Finalize architectural sketch</span>
</div>
<div class="flex items-center gap-4 group cursor-pointer">
<div class="w-5 h-5 rounded-full border border-outline-variant group-hover:border-tertiary transition-colors"></div>
<span class="text-sm font-body text-on-surface group-hover:text-tertiary transition-colors">Review lighting plan</span>
</div>
</div>
</section>
<!-- 4. The Not-to-do list (Boundaries/Noise Filter) -->
<section class="space-y-4">
<h3 class="text-[10px] uppercase tracking-[0.3em] text-error-dim/60 font-medium text-center">Boundaries</h3>
<div class="space-y-3">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[18px] text-error">close</span>
<span class="text-sm font-body text-error line-through decoration-error/50">Check social media</span>
</div>
<div class="flex items-center gap-4 opacity-60">
<span class="material-symbols-outlined text-[18px] text-on-surface-variant">block</span>
<span class="text-sm font-body text-on-surface-variant">Check news</span>
</div>
</div>
</section>
</div>
</main>
<!-- Bottom Navigation Shell -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 flex justify-center items-center gap-8 bg-neutral-900/40 backdrop-blur-2xl w-max rounded-full px-8 py-4 shadow-2xl shadow-black/20 border border-white/5">
<a class="flex items-center justify-center text-neutral-50 relative after:content-[''] after:absolute after:-bottom-2 after:w-1 after:h-1 after:bg-neutral-50 after:rounded-full transition-all duration-300 scale-100" href="#">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
</a>
<a class="flex items-center justify-center text-neutral-500 scale-90 hover:text-neutral-200 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="dashboard_customize">dashboard_customize</span>
</a>
<a class="flex items-center justify-center text-neutral-500 scale-90 hover:text-neutral-200 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="collections">collections</span>
</a>
<a class="flex items-center justify-center text-neutral-500 scale-90 hover:text-neutral-200 transition-all duration-300" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
</nav>
<!-- Decorative Overlay -->
<div class="fixed inset-0 pointer-events-none bg-[radial-gradient(circle_at_center,transparent_0%,rgba(14,14,14,0.4)_100%)]"></div>
</body></html>
