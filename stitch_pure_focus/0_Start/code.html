<body class="flex items-center justify-center min-h-screen bg-background">
<!-- Splash Screen Container -->
<main class="relative flex flex-col items-center justify-center w-full h-screen overflow-hidden">
<!-- Ambient Background Texture -->
<div class="absolute inset-0 z-0 opacity-20" data-alt="Deep charcoal black background with a subtle central radial glow creating a matte velvet texture" style="background-image: radial-gradient(circle at center, #1a1a1a 0%, #0e0e0e 100%);">
</div>
<!-- Central Branding Cluster -->
<div class="z-10 flex flex-col items-center space-y-12">
<!-- Logo String: Pure Focus -->
<!-- Using Manrope for the "Helvetica-style" sophisticated sans-serif request -->
<h1 class="font-body text-2xl md:text-3xl font-light tracking-[0.5em] text-on-surface uppercase select-none">
                Pure Focus
            </h1>
<!-- Decorative Loading Element -->
<div class="flex flex-col items-center space-y-4">
<!-- Tiny loading dot as requested -->
<div class="w-1 h-1 bg-on-surface-variant rounded-full opacity-40"></div>
<!-- Sub-label from JSON Hierarchy if needed, but keeping it minimalist for Splash -->
<p class="font-label text-[10px] tracking-[0.3em] text-on-surface-variant uppercase opacity-0">
                    Entering Environment
                </p>
</div>
</div>
<!-- Subtle Gradient Overlay for Depth -->
<div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-transparent to-background/40"></div>
</main>
<!-- Shared Navigation Suppressed (Transactional/Linear Logic) -->
<!-- The Splash Screen is a focused entry journey, therefore TopAppBar and BottomNavBar are excluded per Semantic Shell Mandate -->
