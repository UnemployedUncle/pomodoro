<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 200, "GRAD" 0, "opsz" 24
    }

    font-family: "Manrope", sans-serif
    }
.font-noto-serif {
    font-family: "Noto Serif", serif
    }
.bg-architectural {
    background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url(https://lh3.googleusercontent.com/aida-public/AB6AXuAYGq5yIYb2WJ7VgZd5P1XiaOBUPqczDz6m-r4mg2uQYxoVePotUpyGmOVgFCf5tXvi--t-ir8Niaw9raRYZDYV3Pvnz1UugJ1xWacRNMS9lstjWr653s5_-TwoA5QR3lC49Jcboul04wWSBwtlZJF_Mp1lKSOCzK-sI2ErrlUWO-wxPVmtFxsgfd_5nc9ZIJwcfRLB5u-0FIB_gbPUMbbplfYbfXSA2oqjFz1jaVyAyR_IBkQX1NAmc0rPn_6Ve7PHgxUK_G9iP7Y);

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar Shell -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-8 py-6 bg-transparent dark:bg-transparent backdrop-blur-sm">
<div class="text-xl text-stone-100 dark:text-stone-50 tracking-wide font-manrope">
            Pure Focus
        </div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-stone-200 dark:text-stone-100 hover:opacity-60 transition-opacity duration-500 cursor-pointer">settings</span>
</div>
</header>
<!-- Main Canvas -->
<main class="relative flex-grow flex flex-col items-center justify-center bg-architectural px-6" data-alt="minimalist architectural photography of a brutalist concrete building with clean lines and soft shadows during twilight">
<!-- Asymmetric Layout: Quote Top-Left (Desktop only) / Centered (Mobile) -->
<div class="absolute top-32 left-8 md:top-40 md:left-20 max-w-sm z-10 hidden md:block">
<p class="font-noto-serif italic text-2xl md:text-3xl text-on-background/90 leading-relaxed tracking-tight">
                "The detail is not the detail. It makes the design."
            </p>
<p class="font-manrope text-xs tracking-[0.2em] text-on-surface-variant mt-4 uppercase">
                Charles Eames
            </p>
</div>
<!-- Center Signature Component: Focus Timer -->
<div class="relative flex flex-col items-center">
<!-- Progress Ring -->
<div class="relative w-80 h-80 md:w-[450px] md:h-[450px] flex items-center justify-center">
<!-- Outer Glass Ring Background -->
<div class="absolute inset-0 rounded-full border-[0.5px] border-outline-variant/30 backdrop-blur-[2px]"></div>
<!-- SVG Progress Ring (Thin) -->
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle class="text-tertiary/20" cx="50%" cy="50%" fill="none" r="48%" stroke="currentColor" stroke-width="1.5"></circle>
<circle class="text-tertiary drop-shadow-[0_0_8px_rgba(255,221,121,0.4)]" cx="50%" cy="50%" fill="none" r="48%" stroke="currentColor" stroke-dasharray="100, 100" stroke-linecap="round" stroke-width="1.5"></circle>
</svg>
<!-- Digital Time Display -->
<div class="text-center z-20">
<div class="font-noto-serif font-light text-7xl md:text-9xl tracking-tighter text-on-background">
                        25:00
                    </div>
<div class="font-manrope text-[10px] tracking-[0.4em] text-on-surface-variant uppercase mt-4">
                        Deep Work Session
                    </div>
</div>
</div>
<!-- Focus Controls -->
<div class="mt-12 flex gap-12 items-center">
<button class="font-manrope text-sm tracking-widest text-on-surface-variant hover:text-on-surface transition-colors duration-300">
                    RESET
                </button>
<button class="w-16 h-16 rounded-full bg-surface-container-high/60 backdrop-blur-xl flex items-center justify-center text-tertiary hover:scale-105 active:scale-95 transition-all duration-300 shadow-xl border border-outline-variant/10">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button class="font-manrope text-sm tracking-widest text-on-surface-variant hover:text-on-surface transition-colors duration-300">
                    SKIP
                </button>
</div>
</div>
<!-- Mobile Quote (Visible only on small screens) -->
<div class="md:hidden mt-16 text-center px-4">
<p class="font-noto-serif italic text-lg text-on-background/70">
                "The detail is not the detail. It makes the design."
            </p>
</div>
<!-- Vision Board Subtle Details (Bento-style Minimal Overlays) -->
<div class="absolute bottom-24 right-8 hidden lg:grid grid-cols-2 gap-4 max-w-xs">
<div class="p-6 bg-stone-900/20 backdrop-blur-xl rounded-xl border border-outline-variant/10 flex flex-col gap-2">
<span class="material-symbols-outlined text-tertiary-dim text-lg">local_cafe</span>
<span class="font-manrope text-[10px] tracking-widest text-on-surface-variant uppercase">Coffee Break</span>
<span class="font-noto-serif text-xl">05:00</span>
</div>
<div class="p-6 bg-stone-900/20 backdrop-blur-xl rounded-xl border border-outline-variant/10 flex flex-col gap-2">
<span class="material-symbols-outlined text-primary-dim text-lg">insights</span>
<span class="font-manrope text-[10px] tracking-widest text-on-surface-variant uppercase">Daily Goal</span>
<span class="font-noto-serif text-xl">4/8</span>
</div>
</div>
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 w-full z-50 flex justify-center items-center pb-4 px-6">
<div class="bg-stone-900/30 dark:bg-stone-950/20 backdrop-blur-2xl rounded-full max-w-fit mx-auto mb-8 flex items-center gap-10 px-10 py-4 shadow-[0_20px_50px_rgba(0,0,0,0.1)]">
<button class="text-stone-50 scale-110 after:content-[''] after:block after:w-1 after:h-1 after:bg-stone-50 after:rounded-full after:mx-auto after:mt-1 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
</button>
<button class="text-stone-500 dark:text-stone-600 hover:text-stone-300 transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined" data-icon="equalizer">equalizer</span>
</button>
<button class="text-stone-500 dark:text-stone-600 hover:text-stone-300 transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
</button>
<button class="text-stone-500 dark:text-stone-600 hover:text-stone-300 transition-all duration-300 active:scale-90">
<span class="material-symbols-outlined" data-icon="photo_library">photo_library</span>
</button>
</div>
</nav>
</body></html>
